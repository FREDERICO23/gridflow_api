version: "3.9"

services:
  # ─── TimescaleDB (PostgreSQL 16 + TimescaleDB extension) ───────────────────
  db:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: gridflow
      POSTGRES_PASSWORD: gridflow
      POSTGRES_DB: gridflow
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gridflow -d gridflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (Celery broker + result backend) ─────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── FastAPI application ────────────────────────────────────────────────────
  api:
    build: .
    restart: unless-stopped
    expose:
      - "8000"
    env_file: .env
    volumes:
      - ./credentials:/app/credentials:ro   # GCS service account JSON (optional)
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  # ─── Celery worker ──────────────────────────────────────────────────────────
  worker:
    build: .
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./credentials:/app/credentials:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Frontend (React + nginx) ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
